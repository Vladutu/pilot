version: 2
updates:
  # Application dependencies (reads gradle/libs.versions.toml + build.gradle.kts)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    ignore:
      # core-ktx >= 1.19 requires compileSdk 37 + AGP 9; drop this once on AGP 9
      - dependency-name: "androidx.core:core-ktx"
        versions: [">=1.19.0"]

  # Keep the CI workflow actions patched too
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
